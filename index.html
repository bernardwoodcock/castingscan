<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Cast Scanner | Agentic Scout</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a18; --paper: #f2ede4; --cream: #e8e1d4; --gold: #c9a84c;
            --muted: #7a7468; --card-bg: #faf7f2; --glow: #00ff41;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--paper); color: var(--ink); font-family: 'DM Mono', monospace; min-height: 100vh; line-height: 1.4; }

        header { border-bottom: 2px solid var(--ink); padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; background: var(--ink); color: var(--paper); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; }
        .logo span { color: var(--gold); font-style: italic; }
        .btn-ghost { background: none; border: 1px solid var(--muted); color: var(--muted); padding: 0.5rem 1rem; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }

        #settingsDrawer { display: none; background: #fff; border-bottom: 2px solid var(--ink); padding: 2rem; }
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; max-width: 1000px; margin: 0 auto; }

        main { max-width: 1200px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 350px 1fr; gap: 2rem; }

        .sidebar { position: sticky; top: 2rem; background: var(--card-bg); border: 2px solid var(--ink); padding: 1.5rem; height: fit-content; }
        .sidebar h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--cream); padding-bottom: 0.5rem; }

        .field { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.65rem; text-transform: uppercase; font-weight: bold; margin-bottom: 0.4rem; color: var(--muted); }
        input, select, textarea { width: 100%; padding: 0.8rem; border: 1px solid var(--ink); background: var(--paper); font-family: 'DM Mono', monospace; font-size: 0.8rem; border-radius: 0; }
        
        .search-controls { background: var(--ink); color: var(--paper); padding: 2rem; margin-bottom: 2rem; border: 2px solid var(--ink); }
        .btn-prime { background: var(--gold); color: var(--ink); border: none; padding: 1.2rem; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 0.1em; transition: 0.2s; }
        .btn-prime:hover { background: #fff; }
        .btn-prime:disabled { opacity: 0.3; cursor: not-allowed; }

        #console { display: none; background: #000; color: var(--glow); padding: 1rem; font-size: 0.7rem; margin-top: 1.5rem; border-left: 4px solid var(--gold); max-height: 200px; overflow-y: auto; }

        .results-list { display: grid; gap: 1.5rem; }
        .card { background: #fff; border: 1px solid var(--ink); padding: 1.5rem; position: relative; }
        .badge { position: absolute; top: 1.5rem; right: 1.5rem; font-weight: bold; color: var(--gold); border: 1px solid var(--gold); padding: 0.2rem 0.5rem; font-size: 0.7rem; }
        .card-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 0.5rem; padding-right: 4.5rem; }
        .card-meta { font-size: 0.7rem; color: var(--muted); margin-bottom: 1rem; text-transform: uppercase; }
        .card-desc { font-size: 0.85rem; line-height: 1.6; margin-bottom: 1.2rem; }
        .card-link { color: var(--ink); font-weight: bold; text-decoration: underline; font-size: 0.75rem; }
        .card-link.disabled { color: var(--muted); text-decoration: none; cursor: not-allowed; opacity: 0.5; }

        @media (max-width: 900px) { main { grid-template-columns: 1fr; } .sidebar { position: static; } }
    </style>
</head>
<body>

<header>
    <div class="logo">Pro-Cast <span>Scanner</span></div>
    <button class="btn-ghost" onclick="toggleSettings()">⚙ API Settings</button>
</header>

<div id="settingsDrawer">
    <div class="settings-grid">
        <div class="field"><label>OpenRouter API Key</label><input type="password" id="aiKey"></div>
        <div class="field"><label>Tavily Search Key</label><input type="password" id="searchKey"></div>
        <div class="field"><label>Model ID</label><input type="text" id="modelId" value="openrouter/free"></div>
    </div>
</div>

<main>
    <aside class="sidebar">
        <h2>Actor Profile</h2>
        <div class="field"><label>Full Name</label><input type="text" id="pName" placeholder="Bernard Woodcock"></div>
        <div class="field"><label>Playing Age</label><input type="text" id="pAge" placeholder="Male, 40s-50s"></div>
        <div class="field"><label>Location</label><input type="text" id="pLoc" placeholder="Sydney, Australia"></div>
        <div class="field"><label>Credits/Keywords</label><textarea id="pCredits" style="width:100%; height:80px;"></textarea></div>
    </aside>

    <section>
        <div class="search-controls">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem; margin-bottom: 1.5rem;">
                <div class="field"><label style="color:var(--gold)">Niche</label><input type="text" id="sKeys" placeholder="Dad, CEO, Villain"></div>
                <div class="field"><label style="color:var(--gold)">Location Scope</label><input type="text" id="sLoc" value="Australia"></div>
            </div>
            <button class="btn-prime" id="scanBtn" onclick="runScout()">▶ Initiate Live Scout</button>
            <div id="console"></div>
        </div>
        <div id="results" class="results-list"></div>
    </section>
</main>

<script>
    const storageFields = ['aiKey', 'searchKey', 'modelId', 'pName', 'pAge', 'pLoc', 'pCredits'];
    window.onload = () => storageFields.forEach(f => {
        const val = localStorage.getItem('pc_' + f);
        if (val) document.getElementById(f).value = val;
    });

    function save() { storageFields.forEach(f => localStorage.setItem('pc_' + f, document.getElementById(f).value)); }
    function toggleSettings() { const d = document.getElementById('settingsDrawer'); d.style.display = d.style.display === 'block' ? 'none' : 'block'; }
    function log(msg) { 
        const c = document.getElementById('console'); c.style.display = 'block';
        const e = document.createElement('div'); e.textContent = `> ${new Date().toLocaleTimeString()}: ${msg}`;
        c.prepend(e);
    }

    async function runScout() {
        save();
        const aiKey = document.getElementById('aiKey').value;
        const sKey = document.getElementById('searchKey').value;
        if (!aiKey || !sKey) return alert("Keys required.");

        const btn = document.getElementById('scanBtn');
        btn.disabled = true;
        document.getElementById('results').innerHTML = '<div style="text-align:center; padding: 2rem;">Searching live data...</div>';

        try {
            log("Tavily: Fetching fresh briefs...");
            const query = `current casting calls ${document.getElementById('pAge').value} ${document.getElementById('sKeys').value} ${document.getElementById('sLoc').value} March 2026`;
            
            const sResp = await fetch('https://api.tavily.com/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    api_key: sKey, query: query, search_depth: "advanced", 
                    max_results: 5, time_range: "week" 
                })
            });
            const sData = await sResp.json();
            
            // Map data and check if content exists
            const raw = sData.results.map(r => `SOURCE_URL: ${r.url}\nCONTENT: ${r.content}`).join("\n\n");
            const profile = `${document.getElementById('pName').value}, ${document.getElementById('pAge').value}, ${document.getElementById('pLoc').value}. Exp: ${document.getElementById('pCredits').value}`;

            log("OpenRouter: Extracting verified roles...");
            const results = await callAI(aiKey, profile, raw);
            renderResults(results);
            log("Analysis Complete.");
        } catch (e) {
            log("ERROR: " + e.message);
            document.getElementById('results').innerHTML = `<div style="text-align:center; padding: 2rem; color:red;">${e.message}</div>`;
        } finally { btn.disabled = false; }
    }

    async function callAI(key, profile, raw) {
        const today = new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
        const prompt = `
            TODAY: ${today}
            ACTOR: ${profile}
            DATA: ${raw}

            STRICT EXTRACTION RULES:
            1. ONLY extract roles where the SOURCE_URL is present in the data.
            2. If you find a role but no clear URL, use the nearest 'SOURCE_URL' found in the text.
            3. DISCARD any role with a deadline before ${today}.
            4. If a URL is missing, return "NO_LINK" in the link field.

            FORMAT: {"opportunities": [{"title":"", "type":"", "location":"", "matchScore":0, "link":"", "why":""}]}`;

        const resp = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json", "HTTP-Referer": window.location.href, "X-Title": "ProCast" },
            body: JSON.stringify({
                "model": document.getElementById('modelId').value,
                "messages": [
                    {"role": "system", "content": "You are a precise JSON extractor. You never return 'undefined' or 'null' for links."},
                    {"role": "user", "content": prompt}
                ],
                "temperature": 0.1 
            })
        });

        const data = await resp.json();
        if (data.error) throw new Error(data.error.message);
        
        const clean = data.choices[0].message.content.replace(/```json|```/g, '').trim();
        return JSON.parse(clean).opportunities;
    }

    function renderResults(list) {
        const container = document.getElementById('results');
        container.innerHTML = '';
        if (!list || list.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding: 2rem;">No active matches found. Try broadening your Niche keywords.</div>';
            return;
        }
        list.forEach(item => {
            const hasLink = item.link && item.link !== "undefined" && item.link !== "NO_LINK";
            const linkText = hasLink ? 'View Listing ↗' : 'Source Link Missing';
            const linkClass = hasLink ? 'card-link' : 'card-link disabled';
            const linkAttr = hasLink ? `href="${item.link}" target="_blank"` : `href="#" onclick="return false;"`;

            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `
                <div class="badge">${item.matchScore}% Match</div>
                <div class="card-title">${item.title}</div>
                <div class="card-meta">${item.type} • ${item.location}</div>
                <div class="card-desc">${item.why}</div>
                <a ${linkAttr} class="${linkClass}">${linkText}</a>`;
            container.appendChild(d);
        });
    }
</script>
</body>
</html>
